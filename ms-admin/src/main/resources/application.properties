spring.application.name=ms-admin
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/sighd_admin?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

security.jwt.secret=${JWT_SECRET:SIGHD_SECRET_KEY_2026_CHANGE_ME_SIGHD_SECRET_KEY_2026_CHANGE_ME}

clients.auth.url=${AUTH_URL:http://localhost:8081}
clients.ms-atencion.url=${MS_ATENCION_URL:http://localhost:8085}
